<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City Internet — Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="admin.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-bg-orbs">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <div class="login-wrapper">
    <div class="login-card animate-pop">
      <div class="login-brand">
        <div class="brand-logo"><i class="fa-solid fa-wifi"></i></div>
        <h1>City <span>Internet</span></h1>
        <p>Admin Control Center</p>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <div class="input-group-modern">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="username" placeholder="Username or Email" autocomplete="username" required />
        </div>

        <div class="input-group-modern">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
          <button type="button" class="toggle-pass" id="togglePass"><i class="fa-solid fa-eye"></i></button>
        </div>

        <div class="login-options">
          <label class="remember"><input type="checkbox" id="remember" /> <span>Remember me</span></label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader"></span>
        </button>

        <div class="login-error" id="loginError"></div>
      </form>
    </div>
    <p class="login-footer">© City Internet 2026. Secured with 256-bit encryption.</p>
  </div>

  <script src="admin.js"></script>
</body>
</html>

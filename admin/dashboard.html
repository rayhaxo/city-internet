<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City Internet — Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="admin.css" rel="stylesheet" />
</head>
<body>
<div class="admin-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo"><i class="fa-solid fa-wifi"></i></div>
      <span class="brand-name">City <b>Internet</b></span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
      <a href="#" class="nav-item" data-page="customers"><i class="fa-solid fa-users"></i><span>Customers</span></a>
      <a href="#" class="nav-item" data-page="billing"><i class="fa-solid fa-file-invoice-dollar"></i><span>Billing</span></a>
      <a href="#" class="nav-item" data-page="packages"><i class="fa-solid fa-box"></i><span>Packages</span></a>
      <a href="#" class="nav-item" data-page="notifications"><i class="fa-solid fa-bell"></i><span>Notifications</span></a>
      <a href="#" class="nav-item" data-page="logs"><i class="fa-solid fa-clock-rotate-left"></i><span>Activity Logs</span></a>
      <a href="#" class="nav-item" data-page="settings"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main-content">
    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="globalSearch" placeholder="Search customers, invoices..." />
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="themeToggle" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
        <div class="notif-wrap">
          <button class="icon-btn" id="notifBtn"><i class="fa-solid fa-bell"></i></button>
        </div>
        <div class="admin-profile">
          <img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff" alt="admin" />
          <div class="profile-info"><b>Admin</b><small>Super Admin</small></div>
        </div>
      </div>
    </header>

    <!-- DYNAMIC PAGES -->
    <main class="page-area" id="pageArea"><!-- Rendered by admin.js --></main>
  </div>
</div>

<!-- Modal Container -->
<div class="modal-overlay" id="modalOverlay"><div class="modal-box" id="modalBox"></div></div>
<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="admin.js"></script>
</body>
</html>
